<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panama Coffee · 1 Yıl</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#F5F0E8;display:flex;align-items:center;justify-content:center;padding:24px 16px;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
.card{width:100%;max-width:370px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(45,90,61,.13),0 2px 8px rgba(0,0,0,.06)}
.head{padding:26px 22px 22px;text-align:center;position:relative;overflow:hidden}
.head-green{background:linear-gradient(160deg,#1a3324 0%,#2D5A3D 60%,#3A6B4A 100%)}
.head-brown{background:linear-gradient(160deg,#3d2a1e 0%,#6b4a35 100%)}
.glow{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 10%,rgba(255,255,255,.07) 0%,transparent 55%);pointer-events:none}
.brand{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:rgba(245,240,232,.5);margin-bottom:2px;position:relative}
.headline{font-family:'Lora',serif;font-size:28px;font-weight:700;color:#F5F0E8;line-height:1.2;margin-bottom:6px;position:relative}
.subhead{font-family:'Lora',serif;font-style:italic;font-size:12px;color:rgba(245,240,232,.58);position:relative}
.body{padding:22px 20px 20px}
.thanks{font-size:14px;line-height:1.7;color:#3d5145;margin-bottom:20px;text-align:center}
.cbox{background:#F5F0E8;border:1.5px dashed rgba(45,90,61,.28);border-radius:14px;padding:16px 18px;text-align:center;margin-bottom:16px;position:relative}
.notch{position:absolute;top:50%;transform:translateY(-50%);width:19px;height:19px;background:#fff;border-radius:50%;border:1.5px dashed rgba(45,90,61,.28)}
.notch-l{left:-10px}.notch-r{right:-10px}
.pct{font-family:'Lora',serif;font-size:48px;font-weight:700;color:#2D5A3D;line-height:1}
.pct-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#3A6B4A;font-weight:500;margin-top:2px;margin-bottom:10px}
.divider{height:1px;background:rgba(45,90,61,.12);margin:10px 0}
.code{font-family:'Lora',serif;font-size:20px;font-weight:600;letter-spacing:4px;color:#1E3D29;margin-bottom:4px}
.code-sub{font-size:10px;color:rgba(45,90,61,.42)}
.btn{width:100%;padding:14px;background:#2D5A3D;color:#F5F0E8;border:none;border-radius:11px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:11px;font-family:'DM Sans',sans-serif}
.btn:active{opacity:.8}
.fine{font-size:11px;color:rgba(45,90,61,.35);line-height:1.6;text-align:center}
.spinner{width:34px;height:34px;border:2.5px solid rgba(45,90,61,.15);border-top-color:#2D5A3D;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{display:none}.active{display:block}
.lang-wrap{width:100%;max-width:370px;text-align:center}
.lang-title{font-family:'Lora',serif;font-size:22px;color:#2D5A3D;margin-bottom:6px}
.lang-sub{font-size:12px;color:rgba(45,90,61,.5);margin-bottom:24px;font-style:italic;font-family:'Lora',serif}
.lang-picker{display:flex;gap:10px}
.lang-btn{flex:1;padding:16px 10px;border:2px solid #2D5A3D;border-radius:14px;background:transparent;color:#2D5A3D;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.lang-btn:active{background:#2D5A3D;color:#F5F0E8}
.lang-flag{font-size:24px;display:block;margin-bottom:6px}
</style>
</head>
<body>

<!-- LOADING -->
<div id="s-loading" class="screen active">
  <div style="text-align:center">
    <div class="spinner"></div>
    <p style="color:#2D5A3D;font-size:13px;opacity:.55;margin-top:14px;font-family:'Lora',serif">…</p>
  </div>
</div>

<!-- DİL SEÇİCİ -->
<div id="s-lang" class="screen">
  <div class="lang-wrap">
    <div style="font-size:36px;margin-bottom:14px">🌱</div>
    <div class="lang-title">Panama Coffee · Taşucu</div>
    <div class="lang-sub">Birlikte 1 Yıl · 1 год вместе</div>
    <div class="lang-picker">
      <button class="lang-btn" onclick="setLang('tr')">
        <span class="lang-flag">🇹🇷</span>Türkçe
      </button>
      <button class="lang-btn" onclick="setLang('ru')">
        <span class="lang-flag">🇷🇺</span>Русский
      </button>
    </div>
  </div>
</div>

<!-- FRESH -->
<div id="s-fresh" class="screen">
  <div class="card">
    <div class="head head-green">
      <div class="glow"></div>
      <div class="brand">Panama Coffee · Taşucu</div>
      <div style="font-size:34px;margin:10px 0 6px;position:relative">🌱</div>
      <div class="headline" id="fresh-headline"></div>
      <div class="subhead" id="fresh-subhead"></div>
    </div>
    <div class="body">
      <p class="thanks" id="fresh-thanks"></p>
      <div class="cbox">
        <div class="notch notch-l"></div>
        <div class="notch notch-r"></div>
        <div class="pct">%20</div>
        <div class="pct-label" id="fresh-pct-label"></div>
        <div class="divider"></div>
        <div class="code" id="code-fresh"></div>
        <div class="code-sub" id="fresh-code-sub"></div>
      </div>
      <button class="btn" id="btn-confirm"></button>
      <div class="fine" id="fresh-fine"></div>
    </div>
  </div>
</div>

<!-- CONFIRMED -->
<div id="s-confirmed" class="screen">
  <div class="card">
    <div class="head head-green">
      <div class="glow"></div>
      <div class="brand">Panama Coffee · Taşucu</div>
      <div style="font-size:40px;margin:12px 0 8px;position:relative">🎉</div>
      <div class="headline" id="conf-headline"></div>
      <div class="subhead" id="conf-subhead"></div>
    </div>
    <div class="body">
      <p class="thanks" id="conf-thanks"></p>
      <div class="cbox">
        <div class="notch notch-l"></div>
        <div class="notch notch-r"></div>
        <div class="pct">%20</div>
        <div class="pct-label" id="conf-pct-label"></div>
        <div class="divider"></div>
        <div class="code" id="code-confirmed"></div>
        <div class="code-sub" id="conf-code-sub"></div>
      </div>
      <div class="fine" id="confirmed-date"></div>
    </div>
  </div>
</div>

<!-- USED -->
<div id="s-used" class="screen">
  <div class="card">
    <div class="head head-brown">
      <div class="glow"></div>
      <div class="brand">Panama Coffee · Taşucu</div>
      <div style="font-size:36px;margin:12px 0 8px;position:relative">☕</div>
      <div class="headline" id="used-headline"></div>
    </div>
    <div class="body" style="text-align:center">
      <p class="thanks" id="used-thanks" style="color:#5a4a3a"></p>
      <div class="fine" id="used-date"></div>
      <div class="fine" style="margin-top:16px">@panamacoffee · #Panama1Yil</div>
    </div>
  </div>
</div>
